{% block navbar %}

<nav class="navbar navbar-expand-md navbar-light border-bottom menu fs-5" aria-label="Main navigation">
        

    <div class="container-fluid">
        <!--Menu Hamburgerowe-->
        <div>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>

            </button>

        </div>


        <!--Menu-->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto ">
                <li nav-item>
                    <a class="nav-link" href="{% url 'home' %}">Home</a>
                </li>
                <li nav-item>
                    <a class="nav-link" href="{% url 'about' %}">About us</a>
                </li>
                <li nav-item>
                    <a class="nav-link" href="{% url 'contact' %}">Contact us</a>
                </li>
            </ul>
    <!--Menu użytkownika-->
            <div class="dropdown">
            {% if user.is_authenticated%}
                <ul class="navbar-nav">
                    <li>
                        <a class="navlink dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false"> <i class="bi bi-person-gear fs-3"></i></a>                       
                            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                                    <p class="text-center"> Hello {{user.username}} ! </p>
                                    {% if user.is_superuser %}
                                        <li><a class="dropdown-item" href= {% url 'admin:index' %}><i class="bi bi-person-vcard"> </i>Admin</a></li>
                                    {% endif %}
                                        <li><a class="dropdown-item" href="#"><i class="bi bi-person"> </i>Profile</a></li>
                                        <li><a class="dropdown-item" href="#"><i class="bi bi-gear"> </i>Settings</a></li>
                                        <li><hr class="dropdown-dividier "></hr>
                                        <form method = "POST" action = {%url 'logout' %} class = "m-0">
                                            {% csrf_token %}
                                            <button type = "submit" class = "dropdown-item text-danger">
                                                <i class="bi bi-box-arrow-right me-1"> Log out</i>
                                            </button> </li>
                                        </form>
                                                            
                            </ul>
                            {% else %}
                            <li class="nav-item"><a class="nav-link" href="{% url 'login' %}" aria-label="Login"> <i class = "bi bi-person-lock fs-5"> </i><a></li>

                            {% endif %}   
                    </li> 
                </ul>                   
            </div>
        </div>
    </div>

    

</nav>

{% endblock navbar %}
